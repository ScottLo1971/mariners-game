<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariners Baseball Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C2340;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    user-select: none;
  }
  h1 {
    color: #C4CED3;
    font-size: 1.6em;
    margin: 8px 0;
    letter-spacing: 2px;
  }
  .mariners-logo { font-size: 1.4em; margin-right: 8px; }
  #game-container {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-top: 10px;
    width: 100%;
    max-width: 900px;
  }
  #field-wrap {
    position: relative;
    width: 500px;
    height: 500px;
    flex-shrink: 0;
  }
  #field-svg {
    width: 100%;
    height: 100%;
  }
  .drop-zone {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px dashed rgba(196,206,211,0.5);
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone.drag-over {
    border-color: #005C5C;
    background: rgba(0,92,92,0.3);
  }
  .drop-zone.filled {
    border: 3px solid #005C5C;
    background: rgba(0,92,92,0.15);
  }
  .drop-zone img {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
  }
  .remove-btn {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #C4122F;
    color: white;
    border: 2px solid white;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 0;
  }
  .remove-btn:hover { background: #e01535; }
  #bench {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
    min-width: 90px;
    max-height: 500px;
    overflow-y: auto;
  }
  #bench-title {
    color: #C4CED3;
    font-size: 0.8em;
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .bench-player {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #C4CED3;
    cursor: grab;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .bench-player:hover {
    transform: scale(1.1);
    box-shadow: 0 0 12px rgba(196,206,211,0.7);
  }
  .bench-player.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }
  .bench-player img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  .bench-player.hidden {
    display: none;
  }
  #reset-btn {
    margin-top: 12px;
    padding: 10px 28px;
    background: #005C5C;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #reset-btn:hover { background: #007070; }
  #success-msg {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #005C5C;
    color: white;
    padding: 30px 50px;
    border-radius: 16px;
    font-size: 2em;
    text-align: center;
    z-index: 100;
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: translate(-50%,-50%) scale(0.5); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }
  /* Admin panel */
  #admin-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #admin-panel.open { display: flex; }
  #admin-box {
    background: #0C2340;
    border: 2px solid #005C5C;
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    color: white;
  }
  #admin-box h2 { color: #C4CED3; margin-bottom: 16px; }
  .admin-player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .admin-player-row img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }
  .admin-player-row span { flex: 1; font-size: 0.9em; }
  .admin-toggle {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85em;
  }
  .admin-toggle.show { background: #005C5C; color: white; }
  .admin-toggle.hide { background: #555; color: #ccc; }
  #admin-close {
    margin-top: 16px;
    padding: 8px 20px;
    background: #005C5C;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
  }
  /* Secret admin trigger */
  #admin-trigger {
    position: fixed;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    opacity: 0;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1><span class="mariners-logo">⚾</span> Mariners</h1>

<div id="game-container">
  <div id="field-wrap">
    <svg id="field-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <!-- Outfield grass circle -->
      <circle cx="250" cy="260" r="220" fill="#2D5A27" />
      <!-- Infield dirt diamond area -->
      <rect x="155" y="160" width="190" height="190" fill="#8B6914" transform="rotate(45 250 255)" rx="4"/>
      <!-- Infield grass -->
      <rect x="165" y="170" width="170" height="170" fill="#3A7A30" transform="rotate(45 250 255)" rx="2"/>
      <!-- Base paths -->
      <line x1="250" y1="380" x2="140" y2="255" stroke="#8B6914" stroke-width="4"/>
      <line x1="250" y1="380" x2="360" y2="255" stroke="#8B6914" stroke-width="4"/>
      <line x1="140" y1="255" x2="250" y2="135" stroke="#8B6914" stroke-width="4"/>
      <line x1="360" y1="255" x2="250" y2="135" stroke="#8B6914" stroke-width="4"/>
      <!-- Pitcher mound -->
      <circle cx="250" cy="262" r="18" fill="#8B6914"/>
      <circle cx="250" cy="262" r="5" fill="#C4A052"/>
      <!-- Bases -->
      <rect x="240" y="370" width="20" height="20" fill="white" rx="2"/>
      <rect x="130" y="245" width="20" height="20" fill="white" rx="2" transform="rotate(45 140 255)"/>
      <rect x="350" y="245" width="20" height="20" fill="white" rx="2" transform="rotate(45 360 255)"/>
      <polygon points="240,125 260,125 260,145 240,145" fill="white"/>
    </svg>

    <!-- Drop zones for positions -->
    <!-- Catcher -->
    <div class="drop-zone" id="dz-catcher" style="left:50%; top:83%" data-pos="catcher"></div>
    <!-- First base -->
    <div class="drop-zone" id="dz-firstBase" style="left:75%; top:56%" data-pos="firstBase"></div>
    <!-- Second base -->
    <div class="drop-zone" id="dz-secondBase" style="left:62%; top:37%" data-pos="secondBase"></div>
    <!-- Shortstop -->
    <div class="drop-zone" id="dz-shortstop" style="left:38%; top:43%" data-pos="shortstop"></div>
    <!-- Third base -->
    <div class="drop-zone" id="dz-thirdBase" style="left:25%; top:56%" data-pos="thirdBase"></div>
    <!-- Left field -->
    <div class="drop-zone" id="dz-leftField" style="left:20%; top:22%" data-pos="leftField"></div>
    <!-- Center field -->
    <div class="drop-zone" id="dz-centerField" style="left:50%; top:12%" data-pos="centerField"></div>
    <!-- Right field -->
    <div class="drop-zone" id="dz-rightField" style="left:80%; top:22%" data-pos="rightField"></div>
    <!-- Pitcher -->
    <div class="drop-zone" id="dz-pitcher" style="left:50%; top:56%" data-pos="pitcher"></div>
  </div>

  <div id="bench">
    <div id="bench-title">LINEUP</div>
    <!-- Bench players inserted by JS -->
  </div>
</div>

<button id="reset-btn">Reset</button>

<div id="success-msg">⚾ Great Job, Luke! ⚾</div>

<!-- Admin panel -->
<div id="admin-trigger" title=""></div>
<div id="admin-panel">
  <div id="admin-box">
    <h2>Manage Players</h2>
    <div id="admin-player-list"></div>
    <button id="admin-close">Done</button>
  </div>
</div>

// State
let state = {
  // which players are visible in bench
  benchVisible: {},
  // what's placed on each position
  positions: {},
  // which player is currently being dragged (key)
  dragging: null,
  // source: 'bench' or 'field'
  dragSource: null,
};

// Initialize state from PLAYERS
PLAYERS.forEach(p => {
  state.benchVisible[p.key] = p.active;
});

function buildBench() {
  const bench = document.getElementById('bench');
  // Remove existing player divs
  bench.querySelectorAll('.bench-player').forEach(el => el.remove());

  PLAYERS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bench-player' + (state.benchVisible[p.key] ? '' : ' hidden');
    div.id = 'bp-' + p.key;
    div.draggable = true;
    div.dataset.key = p.key;
    const img = document.createElement('img');
    img.src = IMAGES[p.key];
    img.alt = p.name;
    div.appendChild(img);
    bench.appendChild(div);

    div.addEventListener('dragstart', e => {
      state.dragging = p.key;
      state.dragSource = 'bench';
      div.classList.add('dragging');
    });
    div.addEventListener('dragend', e => {
      div.classList.remove('dragging');
    });

    // Touch support
    div.addEventListener('touchstart', touchStart, {passive: false});
  });
}

function buildDropZones() {
  document.querySelectorAll('.drop-zone').forEach(dz => {
    dz.addEventListener('dragover', e => {
      e.preventDefault();
      dz.classList.add('drag-over');
    });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      dropOnZone(dz.dataset.pos);
    });
    dz.addEventListener('touchend', e => {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const zone = el && el.closest('.drop-zone');
      if (zone) dropOnZone(zone.dataset.pos);
      removeTouchGhost();
    });
  });

  // Bench is also a drop target so players can be returned from the field
  const bench = document.getElementById('bench');
  bench.addEventListener('dragover', e => {
    if (state.dragSource === 'field') {
      e.preventDefault();
      bench.style.boxShadow = '0 0 0 3px #005C5C';
    }
  });
  bench.addEventListener('dragleave', () => {
    bench.style.boxShadow = '';
  });
  bench.addEventListener('drop', e => {
    e.preventDefault();
    bench.style.boxShadow = '';
    if (state.dragging && state.dragSource === 'field') {
      returnToBench(state.dragging);
    }
  });
}

function dropOnZone(pos) {
  if (!state.dragging) return;
  const key = state.dragging;

  // If source was field, clear that position first
  if (state.dragSource === 'field') {
    for (const [p, k] of Object.entries(state.positions)) {
      if (k === key) delete state.positions[p];
    }
  }

  // If something already in this zone, send it back to bench
  const existing = state.positions[pos];
  if (existing) {
    const bpEl = document.getElementById('bp-' + existing);
    if (bpEl) bpEl.classList.remove('hidden');
  }

  // Place new player
  state.positions[pos] = key;

  // Hide from bench
  const bpEl = document.getElementById('bp-' + key);
  if (bpEl) bpEl.classList.add('hidden');

  renderZones();
  checkWin();
  state.dragging = null;
  state.dragSource = null;
}

function returnToBench(key) {
  // Remove from any field position
  for (const [p, k] of Object.entries(state.positions)) {
    if (k === key) delete state.positions[p];
  }
  // Show in bench
  const bpEl = document.getElementById('bp-' + key);
  if (bpEl) bpEl.classList.remove('hidden');
  renderZones();
  state.dragging = null;
  state.dragSource = null;
}

function renderZones() {
  document.querySelectorAll('.drop-zone').forEach(dz => {
    const pos = dz.dataset.pos;
    dz.innerHTML = '';
    if (state.positions[pos]) {
      const key = state.positions[pos];
      const img = document.createElement('img');
      img.src = IMAGES[key];
      img.draggable = true;
      img.dataset.key = key;
      img.style.cursor = 'pointer';
      img.addEventListener('dragstart', e => {
        state.dragging = key;
        state.dragSource = 'field';
      });
      // Single click or tap returns player to bench
      img.addEventListener('click', e => {
        e.stopPropagation();
        returnToBench(key);
      });
      img.addEventListener('touchend', e => {
        e.preventDefault();
        e.stopPropagation();
        returnToBench(key);
      });
      dz.appendChild(img);
      dz.classList.add('filled');
    } else {
      dz.classList.remove('filled');
    }
  });
}

function checkWin() {
  const filled = Object.keys(state.positions).length;
  const total = document.querySelectorAll('.drop-zone').length;
  // Count visible bench players
  const visibleBench = PLAYERS.filter(p => state.benchVisible[p.key]).length;
  const placed = Object.keys(state.positions).length;
  if (placed === visibleBench && filled > 0) {
    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  }
}

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  state.positions = {};
  PLAYERS.forEach(p => {
    const el = document.getElementById('bp-' + p.key);
    if (el) {
      if (state.benchVisible[p.key]) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }
  });
  renderZones();
});

// ---- TOUCH DRAG ----
let touchGhost = null;
let touchPlayerKey = null;
let touchSourceField = null;

let touchStartX = 0;
let touchStartY = 0;
let touchHasMoved = false;

function touchStart(e) {
  e.preventDefault();
  const el = e.currentTarget;
  touchPlayerKey = el.dataset.key || el.closest('[data-key]')?.dataset.key;
  if (!touchPlayerKey) return;

  touchSourceField = !!el.closest('.drop-zone');
  state.dragging = touchPlayerKey;
  state.dragSource = touchSourceField ? 'field' : 'bench';

  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchHasMoved = false;

  // Don't create ghost yet — wait to see if it's a drag
  document.addEventListener('touchmove', touchMove, {passive: false});
  document.addEventListener('touchend', touchEnd, {passive: false});
}

function touchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  // Only start dragging after moving 8px
  if (!touchHasMoved && Math.sqrt(dx*dx + dy*dy) < 8) return;

  if (!touchHasMoved) {
    touchHasMoved = true;
    // Create ghost now
    if (touchGhost) touchGhost.remove();
    touchGhost = document.createElement('div');
    touchGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:999;width:70px;height:70px;border-radius:50%;overflow:hidden;opacity:0.8;';
    const gi = document.createElement('img');
    gi.src = IMAGES[touchPlayerKey];
    gi.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    touchGhost.appendChild(gi);
    document.body.appendChild(touchGhost);
  }

  if (touchGhost) {
    touchGhost.style.left = (t.clientX - 35) + 'px';
    touchGhost.style.top = (t.clientY - 35) + 'px';
  }
  // Highlight drop zone or bench
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
  document.getElementById('bench').style.boxShadow = '';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el && el.closest('.drop-zone');
  const benchEl = el && el.closest('#bench');
  if (zone) zone.classList.add('drag-over');
  if (benchEl && state.dragSource === 'field') {
    document.getElementById('bench').style.boxShadow = '0 0 0 3px #005C5C';
  }
}

function touchEnd(e) {
  e.preventDefault();
  const t = e.changedTouches[0];
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
  document.getElementById('bench').style.boxShadow = '';

  if (!touchHasMoved) {
    // It was a tap — if player is on field, return them to bench
    if (state.dragSource === 'field' && state.dragging) {
      returnToBench(state.dragging);
    }
  } else {
    // It was a drag — drop on zone or bench
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const zone = el && el.closest('.drop-zone');
    const benchEl = el && el.closest('#bench');
    if (zone && state.dragging) {
      dropOnZone(zone.dataset.pos);
    } else if (benchEl && state.dragging && state.dragSource === 'field') {
      returnToBench(state.dragging);
    }
  }

  removeTouchGhost();
  document.removeEventListener('touchmove', touchMove);
  document.removeEventListener('touchend', touchEnd);
  state.dragging = null;
  state.dragSource = null;
  touchHasMoved = false;
}

function removeTouchGhost() {
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
}

// ---- ADMIN PANEL ----
let adminClickCount = 0;
let adminClickTimer = null;
document.getElementById('admin-trigger').addEventListener('click', () => {
  adminClickCount++;
  clearTimeout(adminClickTimer);
  adminClickTimer = setTimeout(() => adminClickCount = 0, 1500);
  if (adminClickCount >= 5) {
    adminClickCount = 0;
    openAdmin();
  }
});

function openAdmin() {
  const list = document.getElementById('admin-player-list');
  list.innerHTML = '';
  PLAYERS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'admin-player-row';
    const img = document.createElement('img');
    img.src = IMAGES[p.key];
    const name = document.createElement('span');
    name.textContent = p.name;
    const btn = document.createElement('button');
    btn.className = 'admin-toggle ' + (state.benchVisible[p.key] ? 'show' : 'hide');
    btn.textContent = state.benchVisible[p.key] ? 'In Lineup' : 'Hidden';
    btn.addEventListener('click', () => {
      state.benchVisible[p.key] = !state.benchVisible[p.key];
      btn.className = 'admin-toggle ' + (state.benchVisible[p.key] ? 'show' : 'hide');
      btn.textContent = state.benchVisible[p.key] ? 'In Lineup' : 'Hidden';
      // Update bench
      const bpEl = document.getElementById('bp-' + p.key);
      if (bpEl) {
        if (state.benchVisible[p.key]) bpEl.classList.remove('hidden');
        else bpEl.classList.add('hidden');
      }
    });
    row.appendChild(img);
    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
  document.getElementById('admin-panel').classList.add('open');
}

document.getElementById('admin-close').addEventListener('click', () => {
  document.getElementById('admin-panel').classList.remove('open');
});

// Init
buildBench();
buildDropZones();
renderZones();
</script>
